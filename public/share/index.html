<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="PPN Share">
  <meta name="theme-color" content="#020408">
  <title>PPN Share</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="qrcode.min.js"></script>

  <style>
    /* ── DESIGN TOKENS ── */
    :root {
      --bg:          #020408;
      --bg-panel:    rgba(255,255,255,0.05);
      --bg-panel-solid: #0d1117;
      --bg-nav:      #080c12;
      --border:      rgba(255,255,255,0.10);
      --accent:      #7c6ff7;
      --accent-dark: #5b52d4;
      --accent-glow: rgba(124,111,247,0.25);
      --text-1:      #f1f5f9;
      --text-2:      #94a3b8;
      --text-3:      #64748b;
      --font-body:   'Inter', system-ui, sans-serif;
      --font-mono:   'Roboto Mono', ui-monospace, monospace;
      --radius-card: 1.5rem;
      --radius-btn:  0.75rem;
      --nav-h:       72px;
      --header-h:    60px;
    }

    /* ── RESET ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text-1);
      font-family: var(--font-body);
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }

    /* ── LAYOUT SHELL ── */
    .app {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      max-width: 480px;
      margin: 0 auto;
      position: relative;
    }

    /* ── HEADER ── */
    .header {
      height: var(--header-h);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 1.25rem;
      flex-shrink: 0;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
      position: relative;
    }
    .header-wordmark {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--text-1);
    }
    .header-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 10px var(--accent-glow), 0 0 20px var(--accent-glow);
      animation: pulse-dot 2s ease-in-out infinite;
    }
    @keyframes pulse-dot {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.6; transform: scale(0.85); }
    }

    /* ── MAIN CONTENT ── */
    .main {
      flex: 1;
      overflow: hidden;
      position: relative;
    }

    /* ── TAB PANELS ── */
    .tab-panel {
      position: absolute;
      inset: 0;
      padding: 1.25rem 1.25rem 1rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      opacity: 0;
      pointer-events: none;
      transform: translateY(8px);
      transition: opacity 0.2s ease, transform 0.2s ease;
      overflow-y: auto;
    }
    .tab-panel.active {
      opacity: 1;
      pointer-events: all;
      transform: translateY(0);
    }

    /* ── CHIP ── */
    .chip {
      display: inline-flex;
      align-items: center;
      padding: 0.25rem 0.75rem;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      align-self: flex-start;
      border: 1px solid currentColor;
    }

    /* ── PANEL HEADING ── */
    .panel-head {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }
    .panel-headline {
      font-size: 1.5rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      line-height: 1.2;
      color: var(--text-1);
    }
    .panel-sub {
      font-size: 0.875rem;
      color: var(--text-2);
      line-height: 1.5;
    }

    /* ── QR CARD ── */
    .qr-card {
      background: #ffffff;
      border-radius: var(--radius-card);
      padding: 1.25rem;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      max-width: 280px;
      aspect-ratio: 1;
      position: relative;
      box-shadow: 0 0 40px rgba(124,111,247,0.12);
      flex-shrink: 0;
    }
    .qr-card canvas,
    .qr-card img {
      width: 100% !important;
      height: 100% !important;
      display: block;
    }
    .qr-clear {
      position: absolute;
      top: 0.5rem; right: 0.5rem;
      width: 28px; height: 28px;
      border-radius: 50%;
      background: rgba(0,0,0,0.15);
      border: none;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: #555;
      font-size: 0.875rem;
      transition: background 0.15s;
    }
    .qr-clear:hover { background: rgba(0,0,0,0.25); }

    /* ── BUTTONS ── */
    .btn-row {
      display: flex;
      gap: 0.75rem;
      width: 100%;
    }
    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.875rem 1.25rem;
      border-radius: var(--radius-btn);
      font-family: var(--font-body);
      font-size: 0.9375rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      min-height: 52px;
      transition: transform 0.1s ease, opacity 0.15s ease, background 0.15s ease;
      -webkit-tap-highlight-color: transparent;
    }
    .btn:active { transform: scale(0.97); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-primary {
      flex: 1;
      background: var(--accent);
      color: #fff;
    }
    .btn-primary:hover { background: var(--accent-dark); }
    .btn-ghost {
      background: transparent;
      color: var(--accent);
      border: 1.5px solid var(--accent);
      padding: 0.875rem 1rem;
      flex-shrink: 0;
    }
    .btn-ghost:hover { background: var(--accent-glow); }

    /* ── CUSTOM TAB EXTRAS ── */
    .url-input-wrap {
      width: 100%;
      position: relative;
    }
    .url-input {
      width: 100%;
      background: #0d1117;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-btn);
      padding: 0.875rem 1rem;
      font-family: var(--font-mono);
      font-size: 0.8125rem;
      color: var(--text-1);
      min-height: 52px;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
      caret-color: var(--accent);
    }
    .url-input::placeholder { color: var(--text-3); }
    .url-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }
    .history-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      width: 100%;
    }
    .history-chip {
      background: var(--bg-panel);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 0.25rem 0.75rem;
      font-family: var(--font-mono);
      font-size: 0.6875rem;
      color: var(--text-2);
      cursor: pointer;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 180px;
      transition: background 0.15s, color 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .history-chip:hover { background: var(--accent-glow); color: var(--text-1); }

    /* ── INSTALL BANNER ── */
    .install-banner {
      display: none;
      align-items: center;
      gap: 0.75rem;
      background: var(--bg-panel);
      border: 1px solid var(--border);
      border-radius: var(--radius-btn);
      padding: 0.75rem 1rem;
      width: 100%;
    }
    .install-banner.visible { display: flex; }
    .install-banner-text {
      flex: 1;
      font-size: 0.8125rem;
      color: var(--text-2);
      line-height: 1.4;
    }
    .install-banner-text strong { color: var(--text-1); font-weight: 600; }
    .install-btn-wrap { display: flex; gap: 0.5rem; align-items: center; }
    .btn-install {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 0.5rem;
      padding: 0.4rem 0.75rem;
      font-family: var(--font-body);
      font-size: 0.8125rem;
      font-weight: 600;
      cursor: pointer;
      min-height: 36px;
    }
    .btn-dismiss {
      background: none;
      border: none;
      color: var(--text-3);
      cursor: pointer;
      padding: 0.25rem;
      font-size: 1rem;
      line-height: 1;
    }

    /* ── TOAST ── */
    .toast {
      position: fixed;
      bottom: calc(var(--nav-h) + 1rem + env(safe-area-inset-bottom));
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #1e293b;
      color: var(--text-1);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 0.5rem 1.25rem;
      font-size: 0.875rem;
      font-weight: 500;
      opacity: 0;
      transition: opacity 0.2s ease, transform 0.2s ease;
      pointer-events: none;
      white-space: nowrap;
      z-index: 100;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ── BOTTOM NAV ── */
    .bottom-nav {
      height: var(--nav-h);
      padding-bottom: env(safe-area-inset-bottom);
      display: flex;
      align-items: stretch;
      background: var(--bg-nav);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }
    .nav-tab {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.25rem;
      background: none;
      border: none;
      cursor: pointer;
      padding: 0.5rem 0.25rem;
      -webkit-tap-highlight-color: transparent;
      position: relative;
      color: var(--text-3);
      transition: color 0.15s;
    }
    .nav-tab::before {
      content: '';
      position: absolute;
      top: 0; left: 20%; right: 20%;
      height: 2px;
      background: var(--accent);
      border-radius: 0 0 2px 2px;
      opacity: 0;
      transition: opacity 0.15s;
    }
    .nav-tab.active { color: var(--accent); }
    .nav-tab.active::before { opacity: 1; }
    .nav-tab svg { width: 22px; height: 22px; stroke: currentColor; fill: none; stroke-width: 1.75; stroke-linecap: round; stroke-linejoin: round; flex-shrink: 0; }
    .nav-label {
      font-size: 0.625rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      line-height: 1;
    }

    /* ── TABLET NAV (md: 768px+) ── */
    @media (min-width: 768px) {
      .app { max-width: 600px; }
      .bottom-nav { display: none; }
      .header { justify-content: space-between; }
      .top-nav {
        display: flex !important;
        gap: 0.25rem;
      }
      .main { padding-top: 0; }
      .tab-panel { padding: 2rem; }
    }
    .top-nav { display: none; }
    .top-nav-tab {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.4rem 0.75rem;
      border-radius: 0.5rem;
      background: none;
      border: none;
      font-family: var(--font-body);
      font-size: 0.8125rem;
      font-weight: 500;
      color: var(--text-3);
      cursor: pointer;
      transition: color 0.15s, background 0.15s;
    }
    .top-nav-tab svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 1.75; stroke-linecap: round; stroke-linejoin: round; }
    .top-nav-tab.active { color: var(--accent); background: var(--accent-glow); }

    /* ── SCROLLBAR ── */
    .tab-panel::-webkit-scrollbar { width: 4px; }
    .tab-panel::-webkit-scrollbar-track { background: transparent; }
    .tab-panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* ── EMPTY QR STATE ── */
    .qr-empty {
      width: 100%;
      max-width: 280px;
      aspect-ratio: 1;
      border: 2px dashed var(--border);
      border-radius: var(--radius-card);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      color: var(--text-3);
      flex-shrink: 0;
    }
    .qr-empty svg { width: 36px; height: 36px; opacity: 0.5; }
    .qr-empty p { font-size: 0.8125rem; }
  </style>
</head>
<body>

<div class="app">

  <!-- HEADER -->
  <header class="header">
    <div class="header-wordmark">
      <div class="header-dot"></div>
      PPN Share
    </div>
    <!-- Tablet top nav (injected by JS) -->
    <nav class="top-nav" id="topNav" aria-label="Share categories"></nav>
  </header>

  <!-- TOAST -->
  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <!-- MAIN -->
  <main class="main" id="main">
    <!-- Tab panels injected by JS -->
  </main>

  <!-- BOTTOM NAV -->
  <nav class="bottom-nav" id="bottomNav" aria-label="Share categories"></nav>

</div>

<script>
// ── CONFIG ──────────────────────────────────────────────────────────────────

const TABS = [
  {
    id: 'vip',
    label: 'VIP Clinic',
    chip: 'Multi-Site Clinic',
    chipColor: '#7c6ff7',
    headline: 'Founding Partner Program',
    sub: 'Dedicated instance. Rate lock. Onboarding guaranteed.',
    url: 'https://ppnportal.net/psycon/founding-partner',
    shareTitle: 'PPN Portal - Founding Partner Program',
    shareText: 'Zero-PHI clinical documentation. Benchmark your outcomes against the global network.',
    icon: `<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6 22V4a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v18"/><path d="M6 12H4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h2"/><path d="M18 9h2a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2h-2"/><line x1="10" x2="10" y1="6" y2="6"/><line x1="14" x2="14" y1="6" y2="6"/><line x1="10" x2="10" y1="10" y2="10"/><line x1="14" x2="14" y1="10" y2="10"/><line x1="10" x2="10" y1="14" y2="14"/><line x1="14" x2="14" y1="14" y2="14"/><line x1="10" x2="10" y1="18" y2="18"/><line x1="14" x2="14" y1="18" y2="18"/></svg>`
  },
  {
    id: 'solo',
    label: 'Solo',
    chip: 'Solo Practitioner',
    chipColor: '#0d9488',
    headline: 'Join the Data Guild',
    sub: 'Document your first session. Benchmark from day one.',
    url: 'https://ppnportal.net/psycon/data-guild',
    shareTitle: 'PPN Portal - Data Guild',
    shareText: 'The solo practitioner lane. Document sessions and benchmark outcomes against the anonymized network.',
    icon: `<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><polyline points="16 11 18 13 22 9"/></svg>`
  },
  {
    id: 'shield',
    label: 'Shield',
    chip: 'Privacy Architecture',
    chipColor: '#f59e0b',
    headline: 'The Phantom Shield',
    sub: 'No patient names. No DOBs. Zero subpoena liability. By math.',
    url: 'https://ppnportal.net/psycon/phantom-shield',
    shareTitle: 'PPN Portal - Phantom Shield Architecture',
    shareText: 'Cryptographic synthetic Subject IDs. PHI breach liability drops to zero, not as policy, as mathematical fact.',
    icon: `<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><polyline points="9 12 11 14 15 10"/></svg>`
  },
  {
    id: 'research',
    label: 'Research',
    chip: 'Research + IRB',
    chipColor: '#a78bfa',
    headline: 'Research-Ready by Default',
    sub: 'RxNorm. MedDRA. LOINC. Export clean. No data wrangling.',
    url: 'https://ppnportal.net/psycon/research',
    shareTitle: 'PPN Portal - Research Infrastructure',
    shareText: 'Every data point maps to controlled vocabularies. IRB-ready CSV export. No preprocessing required.',
    icon: `<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M9 3H5a2 2 0 0 0-2 2v4m6-6h10a2 2 0 0 1 2 2v4M9 3v18m0 0h10a2 2 0 0 0 2-2v-4M9 21H5a2 2 0 0 1-2-2v-4m0 0h18"/></svg>`
  },
  {
    id: 'custom',
    label: 'Custom',
    chip: 'Any URL',
    chipColor: '#64748b',
    headline: 'Custom Share',
    sub: 'Paste any link. Instant QR.',
    url: null,
    shareTitle: 'PPN Portal',
    shareText: '',
    icon: `<svg viewBox="0 0 24 24" aria-hidden="true"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>`
  }
];

const ICONS = {
  share: `<svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" x2="15.42" y1="13.51" y2="17.49"/><line x1="15.41" x2="8.59" y1="6.51" y2="10.49"/></svg>`,
  copy:  `<svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg>`,
  qrIcon:`<svg viewBox="0 0 24 24" width="36" height="36" stroke="currentColor" fill="none" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><rect width="5" height="5" x="3" y="3" rx=".5"/><rect width="5" height="5" x="16" y="3" rx=".5"/><rect width="5" height="5" x="3" y="16" rx=".5"/><path d="M21 16h-3a2 2 0 0 0-2 2v3"/><path d="M21 21v.01"/><path d="M12 7v3a2 2 0 0 1-2 2H7"/><path d="M3 12h.01"/><path d="M12 3h.01"/><path d="M12 16v.01"/><path d="M16 12h1"/><path d="M21 12v.01"/><path d="M12 21v-1"/></svg>`,
  x:     `<svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" fill="none" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>`
};

// ── STATE ───────────────────────────────────────────────────────────────────

let activeTab = 0;
let customUrl = '';
let customQR = null;
let deferredInstallPrompt = null;
const HISTORY_KEY = 'ppn_share_history';

function getHistory() {
  try { return JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]'); } catch { return []; }
}
function pushHistory(url) {
  if (!url) return;
  let h = getHistory().filter(u => u !== url);
  h.unshift(url);
  h = h.slice(0, 3);
  localStorage.setItem(HISTORY_KEY, JSON.stringify(h));
}

// ── QR GENERATION ───────────────────────────────────────────────────────────

function makeQR(container, url) {
  container.innerHTML = '';
  try {
    new QRCode(container, {
      text: url,
      width: 240,
      height: 240,
      colorDark: '#000000',
      colorLight: '#ffffff',
      correctLevel: QRCode.CorrectLevel.H
    });
  } catch(e) {
    container.innerHTML = `<p style="color:#666;font-size:12px;padding:1rem;">QR unavailable</p>`;
  }
}

// ── SHARE / COPY ─────────────────────────────────────────────────────────────

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

async function doShare(tab, url) {
  const shareUrl = url || tab.url;
  if (!shareUrl) return;
  if (navigator.share) {
    try {
      await navigator.share({ title: tab.shareTitle, text: tab.shareText, url: shareUrl });
    } catch(e) {
      if (e.name !== 'AbortError') doCopy(shareUrl);
    }
  } else {
    doCopy(shareUrl);
  }
}

function doCopy(url) {
  if (navigator.clipboard) {
    navigator.clipboard.writeText(url).then(() => showToast('Link copied'));
  } else {
    const ta = document.createElement('textarea');
    ta.value = url;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    showToast('Link copied');
  }
}

// ── RENDER PANELS ────────────────────────────────────────────────────────────

function renderPanels() {
  const main = document.getElementById('main');
  main.innerHTML = '';

  TABS.forEach((tab, i) => {
    const panel = document.createElement('div');
    panel.className = 'tab-panel' + (i === activeTab ? ' active' : '');
    panel.id = `panel-${tab.id}`;
    panel.setAttribute('role', 'tabpanel');
    panel.setAttribute('aria-labelledby', `tab-${tab.id}`);

    if (tab.id !== 'custom') {
      // ── Standard tab ──
      panel.innerHTML = `
        <div class="chip" style="color:${tab.chipColor};border-color:${tab.chipColor}22;background:${tab.chipColor}18;">${tab.chip}</div>
        <div class="panel-head">
          <h2 class="panel-headline">${tab.headline}</h2>
          <p class="panel-sub">${tab.sub}</p>
        </div>
        <div class="qr-card" id="qr-${tab.id}" aria-label="QR code linking to ${tab.label} landing page"></div>
        <div class="btn-row">
          <button class="btn btn-primary" id="share-${tab.id}" aria-label="Share ${tab.label} link">
            ${ICONS.share} Share
          </button>
          <button class="btn btn-ghost" id="copy-${tab.id}" aria-label="Copy ${tab.label} link">
            ${ICONS.copy} Copy
          </button>
        </div>
      `;

      // Bind after insert
      setTimeout(() => {
        makeQR(document.getElementById(`qr-${tab.id}`), tab.url);
        document.getElementById(`share-${tab.id}`).addEventListener('click', () => doShare(tab, tab.url));
        document.getElementById(`copy-${tab.id}`).addEventListener('click', () => doCopy(tab.url));
      }, 0);

    } else {
      // ── Custom tab ──
      panel.innerHTML = `
        <div class="chip" style="color:#94a3b8;border-color:#94a3b820;background:#94a3b810;">Any URL</div>
        <div class="panel-head">
          <h2 class="panel-headline">${tab.headline}</h2>
          <p class="panel-sub">${tab.sub}</p>
        </div>
        <div class="url-input-wrap">
          <input class="url-input" id="customInput" type="url" inputmode="url"
            placeholder="Paste any URL..." autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"
            aria-label="Paste URL to generate QR code"
          />
        </div>
        <div class="qr-empty" id="qrEmpty" aria-hidden="true">
          ${ICONS.qrIcon}
          <p>QR appears here</p>
        </div>
        <div class="qr-card" id="qr-custom" style="display:none;" aria-label="QR code for custom URL">
          <button class="qr-clear" id="clearCustom" aria-label="Clear URL">${ICONS.x}</button>
        </div>
        <div class="history-chips" id="historyChips"></div>
        <div class="btn-row">
          <button class="btn btn-primary" id="share-custom" disabled aria-label="Share custom link">
            ${ICONS.share} Share
          </button>
          <button class="btn btn-ghost" id="copy-custom" disabled aria-label="Copy custom link">
            ${ICONS.copy} Copy
          </button>
        </div>
      `;

      setTimeout(() => {
        const input = document.getElementById('customInput');
        const qrCard = document.getElementById('qr-custom');
        const qrEmpty = document.getElementById('qrEmpty');
        const shareBtn = document.getElementById('share-custom');
        const copyBtn = document.getElementById('copy-custom');
        const clearBtn = document.getElementById('clearCustom');
        const chipsEl = document.getElementById('historyChips');

        function renderHistory() {
          const h = getHistory();
          chipsEl.innerHTML = '';
          h.forEach(u => {
            const chip = document.createElement('button');
            chip.className = 'history-chip';
            chip.textContent = u.replace(/^https?:\/\//, '');
            chip.title = u;
            chip.addEventListener('click', () => { input.value = u; input.dispatchEvent(new Event('input')); });
            chipsEl.appendChild(chip);
          });
        }

        function applyCustomUrl(url) {
          customUrl = url;
          if (!url) {
            qrCard.style.display = 'none';
            qrEmpty.style.display = '';
            shareBtn.disabled = true;
            copyBtn.disabled = true;
          } else {
            qrEmpty.style.display = 'none';
            qrCard.style.display = 'flex';
            // Remove old canvas
            const old = qrCard.querySelector('canvas');
            if (old) old.remove();
            makeQR(qrCard, url);
            shareBtn.disabled = false;
            copyBtn.disabled = false;
          }
        }

        let debounceTimer;
        input.addEventListener('input', () => {
          clearTimeout(debounceTimer);
          const val = input.value.trim();
          debounceTimer = setTimeout(() => {
            const url = val && (val.startsWith('http://') || val.startsWith('https://'))
              ? val
              : val ? 'https://' + val : '';
            applyCustomUrl(url);
          }, 400);
        });

        shareBtn.addEventListener('click', () => {
          if (!customUrl) return;
          pushHistory(customUrl);
          renderHistory();
          doShare({ shareTitle: 'PPN Portal', shareText: customUrl }, customUrl);
        });

        copyBtn.addEventListener('click', () => {
          if (!customUrl) return;
          pushHistory(customUrl);
          renderHistory();
          doCopy(customUrl);
        });

        clearBtn.addEventListener('click', () => {
          input.value = '';
          applyCustomUrl('');
          input.focus();
        });

        renderHistory();
      }, 0);
    }

    main.appendChild(panel);
  });
}

// ── RENDER NAV ───────────────────────────────────────────────────────────────

function renderNav() {
  const bottomNav = document.getElementById('bottomNav');
  const topNav = document.getElementById('topNav');
  bottomNav.innerHTML = '';
  topNav.innerHTML = '';

  TABS.forEach((tab, i) => {
    // Bottom nav button
    const btn = document.createElement('button');
    btn.className = 'nav-tab' + (i === activeTab ? ' active' : '');
    btn.id = `tab-${tab.id}`;
    btn.setAttribute('role', 'tab');
    btn.setAttribute('aria-selected', i === activeTab);
    btn.setAttribute('aria-controls', `panel-${tab.id}`);
    btn.innerHTML = `${tab.icon}<span class="nav-label">${tab.label}</span>`;
    btn.addEventListener('click', () => switchTab(i));
    bottomNav.appendChild(btn);

    // Top nav button (tablet)
    const tBtn = document.createElement('button');
    tBtn.className = 'top-nav-tab' + (i === activeTab ? ' active' : '');
    tBtn.setAttribute('role', 'tab');
    tBtn.setAttribute('aria-selected', i === activeTab);
    tBtn.innerHTML = `${tab.icon} ${tab.label}`;
    tBtn.addEventListener('click', () => switchTab(i));
    topNav.appendChild(tBtn);
  });
}

// ── SWITCH TAB ───────────────────────────────────────────────────────────────

function switchTab(idx) {
  activeTab = idx;

  // Update panels
  document.querySelectorAll('.tab-panel').forEach((p, i) => {
    p.classList.toggle('active', i === idx);
  });
  // Update bottom nav
  document.querySelectorAll('.nav-tab').forEach((b, i) => {
    b.classList.toggle('active', i === idx);
    b.setAttribute('aria-selected', i === idx);
  });
  // Update top nav
  document.querySelectorAll('.top-nav-tab').forEach((b, i) => {
    b.classList.toggle('active', i === idx);
    b.setAttribute('aria-selected', i === idx);
  });
}

// ── INSTALL PROMPT ───────────────────────────────────────────────────────────

window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredInstallPrompt = e;
  if (!localStorage.getItem('ppn_install_dismissed')) {
    showInstallBanner();
  }
});

function showInstallBanner() {
  // Find the active panel and inject banner at top
  const activePanel = document.querySelector('.tab-panel.active');
  if (!activePanel || document.getElementById('installBanner')) return;

  const banner = document.createElement('div');
  banner.className = 'install-banner visible';
  banner.id = 'installBanner';
  banner.innerHTML = `
    <div class="install-banner-text">
      <strong>Add PPN Share</strong> to your home screen for instant access.
    </div>
    <div class="install-btn-wrap">
      <button class="btn-install" id="installBtn">Add</button>
      <button class="btn-dismiss" id="dismissInstall" aria-label="Dismiss">${ICONS.x}</button>
    </div>
  `;
  activePanel.insertBefore(banner, activePanel.firstChild);

  document.getElementById('installBtn').addEventListener('click', async () => {
    if (!deferredInstallPrompt) return;
    deferredInstallPrompt.prompt();
    const { outcome } = await deferredInstallPrompt.userChoice;
    if (outcome === 'accepted') showToast('PPN Share added to home screen');
    deferredInstallPrompt = null;
    banner.remove();
  });

  document.getElementById('dismissInstall').addEventListener('click', () => {
    localStorage.setItem('ppn_install_dismissed', '1');
    banner.remove();
  });
}

// ── SERVICE WORKER ───────────────────────────────────────────────────────────

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  });
}

// ── INIT ─────────────────────────────────────────────────────────────────────

renderPanels();
renderNav();
</script>
