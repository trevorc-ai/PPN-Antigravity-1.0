<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PPN RWE Registry — Institutional Research Packet</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Roboto+Mono:wght@400;500&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --navy: #0e1a2b; --navy-mid: #1c2e45; --navy-light: #e8edf5;
    --ink: #1a1f2e; --ink-body: #2c3347; --ink-muted: #6b7280;
    --border: #c8cdd8; --border-light: #e4e8f0;
    --bg: #fafaf8; --bg-subtle: #f0f2f7;
  }
  html, body { height: 100%; margin: 0; }
  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: var(--bg-subtle);
    display: flex; flex-direction: column;
    -webkit-print-color-adjust: exact; print-color-adjust: exact;
  }

  /* ─── Brand bar ─── */
  .brand-bar {
    background: var(--navy); padding: 0 32px; height: 48px;
    display: flex; align-items: center; justify-content: space-between;
    flex-shrink: 0;
    -webkit-print-color-adjust: exact; print-color-adjust: exact;
  }
  .brand { display: flex; flex-direction: column; }
  .brand-top { font-size: 11px; font-weight: 600; color: rgba(255,255,255,0.9); letter-spacing: 0.06em; text-transform: uppercase; }
  .brand-sub { font-size: 9px; font-weight: 400; color: rgba(255,255,255,0.4); letter-spacing: 0.06em; text-transform: uppercase; margin-top: 1px; }
  .doc-id { font-family: 'Roboto Mono', monospace; font-size: 10px; color: rgba(255,255,255,0.35); letter-spacing: 0.06em; }
  .print-btn {
    font-size: 11px; font-weight: 600;
    color: rgba(255,255,255,0.7);
    background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.18);
    cursor: pointer; padding: 6px 14px; border-radius: 5px;
    display: flex; align-items: center; gap: 5px;
    transition: background 0.15s;
    -webkit-print-color-adjust: exact; print-color-adjust: exact;
  }
  .print-btn:hover { background: rgba(255,255,255,0.18); color: white; }

  /* ─── Tab section ─── */
  .tab-section {
    background: var(--bg); border-bottom: 1px solid var(--border);
    padding: 20px 32px 0; flex-shrink: 0;
    -webkit-print-color-adjust: exact; print-color-adjust: exact;
  }
  .tab-section-label {
    font-size: 10px; font-weight: 600; letter-spacing: 0.14em;
    text-transform: uppercase; color: var(--ink-muted);
    text-align: center; margin-bottom: 16px;
  }

  /* Adobe-style tab row */
  .tab-row {
    display: flex; justify-content: center; align-items: stretch;
    max-width: 820px; margin: 0 auto;
    border: 1.5px solid var(--border); border-radius: 8px;
    overflow: hidden; background: var(--bg-subtle);
    -webkit-print-color-adjust: exact; print-color-adjust: exact;
  }
  .tab {
    flex: 1; display: flex; flex-direction: column; align-items: center;
    justify-content: center; gap: 3px; padding: 13px 6px;
    font-size: 11px; font-weight: 500; color: var(--ink-body);
    cursor: pointer; border: none; background: transparent;
    border-right: 1px solid var(--border);
    transition: color 0.15s, background 0.15s; white-space: nowrap;
  }
  .tab:last-child { border-right: none; }
  .tab:hover { color: var(--ink); background: rgba(14,26,43,0.04); }
  .tab.active {
    background: var(--bg); color: var(--navy);
    font-weight: 700;
    box-shadow: inset 0 -3px 0 var(--navy);
    -webkit-print-color-adjust: exact; print-color-adjust: exact;
  }
  .tab-icon { font-size: 15px; line-height: 1; }
  .tab-label { font-size: 11px; font-weight: inherit; line-height: 1.2; }
  .tab-sub { font-size: 9px; color: var(--ink-muted); font-weight: 400; letter-spacing: 0.02em; }
  .tab.active .tab-sub { color: rgba(14,26,43,0.45); }
  .tab-num {
    font-family: 'Roboto Mono', monospace; font-size: 9px;
    color: var(--ink-muted); font-weight: 500; letter-spacing: 0.05em;
  }
  .tab.active .tab-num { color: var(--navy); }

  /* Progress dots */
  .tab-progress {
    display: flex; justify-content: center; gap: 4px; padding: 10px 0 0;
  }
  .prog-dot {
    width: 5px; height: 5px; border-radius: 50%;
    background: var(--border); cursor: pointer; transition: background 0.2s;
    -webkit-print-color-adjust: exact; print-color-adjust: exact;
  }
  .prog-dot.active { background: var(--navy); -webkit-print-color-adjust: exact; print-color-adjust: exact; }

  /* Nav arrows */
  .nav-arrows {
    display: flex; justify-content: center; align-items: center;
    gap: 12px; padding: 10px 0 16px;
  }
  .nav-arrow {
    background: none; border: 1.5px solid var(--border); border-radius: 5px;
    color: var(--ink-muted); cursor: pointer; font-size: 12px;
    padding: 5px 16px; font-weight: 600;
    transition: border-color 0.15s, color 0.15s;
    display: flex; align-items: center; gap: 6px;
  }
  .nav-arrow:hover { border-color: var(--navy); color: var(--navy); }
  .nav-status {
    font-family: 'Roboto Mono', monospace;
    font-size: 11px; color: var(--ink-muted); min-width: 60px; text-align: center;
  }
  .print-btn-inline {
    font-size: 11px; font-weight: 600; color: var(--ink-body);
    background: var(--bg-subtle); border: 1.5px solid var(--border); border-radius: 5px;
    cursor: pointer; padding: 5px 14px; margin-left: 16px;
    display: flex; align-items: center; gap: 5px;
    transition: border-color 0.15s, color 0.15s;
  }
  .print-btn-inline:hover { border-color: var(--navy); color: var(--navy); }

  /* Frame */
  .frame-wrap { flex: 1; position: relative; min-height: 0; }
  .doc-frame { position: absolute; inset: 0; width: 100%; height: 100%; border: none; display: none; background: white; }
  .doc-frame.active { display: block; }
</style>
</head>
<body>

<!-- Brand bar -->
<div class="brand-bar">
  <div class="brand">
    <span class="brand-top">PPN Real-World Evidence Registry</span>
    <span class="brand-sub">Institutional Research Division</span>
  </div>
  <span class="doc-id">PPN-RWE-2026-V1</span>
</div>

<!-- Tab section -->
<div class="tab-section">
  <div class="tab-section-label">Navigate the Research Packet</div>

  <div class="tab-row" id="tab-row">
    <button class="tab active" data-frame="frame-0" data-index="0" onclick="switchTab(this)">
      <span class="tab-icon">&#128196;</span>
      <span class="tab-label">Cover</span>
      <span class="tab-num">CV</span>
    </button>
    <button class="tab" data-frame="frame-toc" data-index="1" onclick="switchTab(this)">
      <span class="tab-icon">&#9776;</span>
      <span class="tab-label">Contents</span>
      <span class="tab-num">TC</span>
    </button>
    <button class="tab" data-frame="frame-1" data-index="2" onclick="switchTab(this)">
      <span class="tab-icon">&#128202;</span>
      <span class="tab-label">Data Taxonomy</span>
      <span class="tab-num">&sect;1</span>
    </button>
    <button class="tab" data-frame="frame-2" data-index="3" onclick="switchTab(this)">
      <span class="tab-icon">&#9881;</span>
      <span class="tab-label">Tech Specs</span>
      <span class="tab-num">&sect;2</span>
    </button>
    <button class="tab" data-frame="frame-3" data-index="4" onclick="switchTab(this)">
      <span class="tab-icon">&#128274;</span>
      <span class="tab-label">Phantom Shield</span>
      <span class="tab-num">&sect;3</span>
    </button>
    <button class="tab" data-frame="frame-4" data-index="5" onclick="switchTab(this)">
      <span class="tab-icon">&#128248;</span>
      <span class="tab-label">Visual Brief</span>
      <span class="tab-num">&sect;4</span>
    </button>
    <button class="tab" data-frame="frame-5" data-index="6" onclick="switchTab(this)">
      <span class="tab-icon">&#128221;</span>
      <span class="tab-label">Charter</span>
      <span class="tab-num">&sect;5</span>
    </button>
  </div>

  <!-- Dots + arrows -->
  <div class="tab-progress" id="dots">
    <div class="prog-dot active" onclick="goToIndex(0)"></div>
    <div class="prog-dot" onclick="goToIndex(1)"></div>
    <div class="prog-dot" onclick="goToIndex(2)"></div>
    <div class="prog-dot" onclick="goToIndex(3)"></div>
    <div class="prog-dot" onclick="goToIndex(4)"></div>
    <div class="prog-dot" onclick="goToIndex(5)"></div>
    <div class="prog-dot" onclick="goToIndex(6)"></div>
  </div>

  <div class="nav-arrows">
    <button class="nav-arrow" onclick="prevTab()">&#8592; Previous</button>
    <span class="nav-status" id="nav-status">1 / 7</span>
    <button class="nav-arrow" onclick="nextTab()">Next &#8594;</button>
    <button class="print-btn-inline" onclick="printCurrent()">&#128438; Print This Page</button>
  </div>
</div>

<!-- Document frames -->
<div class="frame-wrap">
  <iframe class="doc-frame active" id="frame-0"   src="researcher_html/00_Cover_Page.html"></iframe>
  <iframe class="doc-frame"        id="frame-toc"  src="researcher_html/00_Table_of_Contents.html"></iframe>
  <iframe class="doc-frame"        id="frame-1"    src="researcher_html/PPN_Clinical_Data_Taxonomy.html"></iframe>
  <iframe class="doc-frame"        id="frame-2"    src="researcher_html/PPN_Technical_Specifications.html"></iframe>
  <iframe class="doc-frame"        id="frame-3"    src="researcher_html/PPN_Phantom_Shield.html"></iframe>
  <iframe class="doc-frame"        id="frame-4"    src="researcher_html/PPN_Platform_Visual_Brief.html"></iframe>
  <iframe class="doc-frame"        id="frame-5"    src="researcher_html/PPN_Founding_Partner_Charter.html"></iframe>
</div>

<script>
  const TOTAL = 7;
  let current = 0;

  function switchTab(btn) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.doc-frame').forEach(f => f.classList.remove('active'));
    document.querySelectorAll('.prog-dot').forEach(d => d.classList.remove('active'));

    btn.classList.add('active');
    document.getElementById(btn.getAttribute('data-frame')).classList.add('active');
    current = parseInt(btn.getAttribute('data-index'));
    document.querySelectorAll('.prog-dot')[current].classList.add('active');
    document.getElementById('nav-status').textContent = (current + 1) + ' / ' + TOTAL;
  }

  function goToIndex(i) {
    switchTab(document.querySelectorAll('.tab')[i]);
  }
  function nextTab() { goToIndex(Math.min(current + 1, TOTAL - 1)); }
  function prevTab() { goToIndex(Math.max(current - 1, 0)); }
  function printCurrent() {
    const f = document.querySelector('.doc-frame.active');
    if (!f) return;
    const win = window.open(f.src, '_blank');
    win.onload = function() { win.focus(); win.print(); };
  }
</script>
</body>
</html>
