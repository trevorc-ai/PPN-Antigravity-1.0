<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Assessment Wizard</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2b6cee",
                        "background-light": "#f6f6f8",
                        "background-dark": "#101622",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .glass-card {
            background: rgba(43, 108, 238, 0.05);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .glass-button {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.2s ease;
        }
        .glass-button:active {
            background: rgba(255, 255, 255, 0.08);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">
<div class="fixed inset-0 z-[-1] overflow-hidden pointer-events-none">
<div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-primary/10 rounded-full blur-[120px]"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[50%] h-[50%] bg-primary/5 rounded-full blur-[150px]"></div>
</div>
<header class="flex flex-col w-full px-6 pt-8 pb-4">
<div class="flex items-center justify-between mb-6">
<button class="w-10 h-10 flex items-center justify-center rounded-full glass-button text-slate-100">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h2 class="text-lg font-bold tracking-tight text-slate-100">Assessment Wizard</h2>
<div class="w-10"></div>
</div>
<div class="flex flex-col gap-3">
<div class="flex justify-between items-end">
<span class="text-sm font-medium text-slate-400">Question 5 of 5</span>
<span class="text-sm font-bold text-primary">100%</span>
</div>
<div class="h-1.5 w-full bg-slate-800 rounded-full overflow-hidden">
<div class="h-full bg-primary w-full shadow-[0_0_12px_rgba(43,108,238,0.5)]"></div>
</div>
</div>
</header>
<main class="flex-1 flex flex-col items-center justify-center px-6 py-8">
<div class="w-full max-w-md text-center space-y-4 mb-10">
<h3 class="text-2xl md:text-3xl font-bold leading-tight text-white tracking-tight">
                Sense that the experience cannot be described adequately in words.
            </h3>
<p class="inline-block px-3 py-1 rounded-full bg-primary/10 border border-primary/20 text-xs font-medium text-primary uppercase tracking-wider">
                Ref: Barrett et al., 2015
            </p>
</div>
<div class="w-full max-w-md flex flex-col gap-3">
<button class="glass-button w-full h-14 rounded-xl flex items-center px-6 group">
<span class="w-8 h-8 flex items-center justify-center rounded-lg bg-slate-800 text-slate-400 text-sm font-bold mr-4 group-hover:bg-primary/20 group-hover:text-primary transition-colors">0</span>
<span class="text-slate-300 font-medium">None</span>
</button>
<button class="glass-button w-full h-14 rounded-xl flex items-center px-6 group">
<span class="w-8 h-8 flex items-center justify-center rounded-lg bg-slate-800 text-slate-400 text-sm font-bold mr-4 group-hover:bg-primary/20 group-hover:text-primary transition-colors">1</span>
<span class="text-slate-300 font-medium">Slight</span>
</button>
<button class="w-full h-14 rounded-xl flex items-center px-6 bg-primary shadow-lg shadow-primary/20 border border-primary/50 relative overflow-hidden">
<span class="w-8 h-8 flex items-center justify-center rounded-lg bg-white/20 text-white text-sm font-bold mr-4">2</span>
<span class="text-white font-bold">Moderate (Active)</span>
<span class="material-symbols-outlined absolute right-6 text-white/50">check_circle</span>
</button>
<button class="glass-button w-full h-14 rounded-xl flex items-center px-6 group">
<span class="w-8 h-8 flex items-center justify-center rounded-lg bg-slate-800 text-slate-400 text-sm font-bold mr-4 group-hover:bg-primary/20 group-hover:text-primary transition-colors">3</span>
<span class="text-slate-300 font-medium">Strong</span>
</button>
<button class="glass-button w-full h-14 rounded-xl flex items-center px-6 group">
<span class="w-8 h-8 flex items-center justify-center rounded-lg bg-slate-800 text-slate-400 text-sm font-bold mr-4 group-hover:bg-primary/20 group-hover:text-primary transition-colors">4</span>
<span class="text-slate-300 font-medium">Extreme</span>
</button>
</div>
</main>
<footer class="p-6 bg-background-dark/80 backdrop-blur-xl border-t border-white/5">
<div class="max-w-md mx-auto flex gap-4">
<button class="flex-1 h-14 glass-button rounded-xl flex items-center justify-center text-slate-300 font-semibold gap-2">
<span class="material-symbols-outlined text-xl">chevron_left</span>
                Previous
            </button>
<button class="flex-[1.5] h-14 bg-primary hover:bg-primary/90 rounded-xl flex items-center justify-center text-white font-bold shadow-lg shadow-primary/25 transition-all active:scale-95">
                Complete Assessment
            </button>
</div>
</footer>
</body></html>
