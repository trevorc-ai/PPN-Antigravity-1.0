<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2b6cee",
                        "background-light": "#f6f6f8",
                        "background-dark": "#0a0f18",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "2xl": "1rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .glass-input {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .custom-select {
            appearance: none;
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%2394a3b8' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e");
            background-position: right 0.75rem center;
            background-repeat: no-repeat;
            background-size: 1.5em 1.5em;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">
<!-- Top Navigation Bar -->
<header class="sticky top-0 z-50 glass-card border-b border-white/10 px-4 py-4">
<div class="flex items-center justify-between mb-4">
<button class="text-slate-400 hover:text-white transition-colors">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="text-lg font-bold tracking-tight">Session Vital Signs</h1>
<div class="w-6"></div> <!-- Spacer for centering -->
</div>
<div class="space-y-2">
<div class="flex justify-between items-end">
<span class="text-xs font-semibold uppercase tracking-wider text-primary">Extended &amp; Neurological</span>
<span class="text-xs text-slate-400">Step 3 of 3</span>
</div>
<div class="h-1.5 w-full bg-slate-800 rounded-full overflow-hidden">
<div class="h-full bg-primary rounded-full w-full"></div>
</div>
</div>
</header>
<!-- Main Content Area -->
<main class="flex-1 overflow-y-auto p-4 space-y-6 pb-24">
<!-- Extended Monitoring Section -->
<section class="space-y-4">
<div class="flex items-center gap-2 px-1">
<span class="material-symbols-outlined text-primary text-xl">monitoring</span>
<h2 class="text-sm font-semibold uppercase tracking-widest text-slate-400">Extended Monitoring</h2>
</div>
<div class="glass-card rounded-2xl p-5 space-y-5">
<div class="space-y-2">
<label class="text-sm font-medium text-slate-300">Diaphoresis</label>
<div class="relative">
<select class="custom-select glass-input w-full h-14 rounded-xl px-4 text-slate-100 focus:ring-2 focus:ring-primary/50 focus:border-primary outline-none transition-all appearance-none">
<option disabled="" selected="" value="">Select level</option>
<option value="none">None</option>
<option value="mild">Mild</option>
<option value="moderate">Moderate</option>
<option value="severe">Severe (Profuse)</option>
</select>
</div>
</div>
<div class="space-y-2">
<label class="text-sm font-medium text-slate-300">Consciousness</label>
<div class="relative">
<select class="custom-select glass-input w-full h-14 rounded-xl px-4 text-slate-100 focus:ring-2 focus:ring-primary/50 focus:border-primary outline-none transition-all appearance-none">
<option disabled="" selected="" value="">Select state</option>
<option value="alert">Alert &amp; Oriented</option>
<option value="lethargic">Lethargic</option>
<option value="obtunded">Obtunded</option>
<option value="stuporous">Stuporous</option>
<option value="comatose">Comatose</option>
</select>
</div>
</div>
</div>
</section>
<!-- Neurological Observations Section -->
<section class="space-y-4">
<div class="flex items-center gap-2 px-1">
<span class="material-symbols-outlined text-primary text-xl">psychology</span>
<h2 class="text-sm font-semibold uppercase tracking-widest text-slate-400">Neurological Observations</h2>
</div>
<div class="glass-card rounded-2xl p-1 overflow-hidden">
<label class="flex items-center justify-between p-4 hover:bg-white/5 transition-colors cursor-pointer group">
<div class="flex flex-col">
<span class="font-medium">Clonus</span>
<span class="text-xs text-slate-500">Involuntary muscle contractions</span>
</div>
<div class="relative inline-flex items-center cursor-pointer">
<input class="sr-only peer" type="checkbox"/>
<div class="w-11 h-6 bg-slate-800 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-primary"></div>
</div>
</label>
<div class="h-[1px] bg-white/5 mx-4"></div>
<label class="flex items-center justify-between p-4 hover:bg-white/5 transition-colors cursor-pointer group">
<div class="flex flex-col">
<span class="font-medium">Saccadic Eye Movements</span>
<span class="text-xs text-slate-500">Rapid movement of both eyes</span>
</div>
<div class="relative inline-flex items-center cursor-pointer">
<input checked="" class="sr-only peer" type="checkbox"/>
<div class="w-11 h-6 bg-slate-800 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-primary"></div>
</div>
</label>
</div>
</section>
<!-- QT Interval Tracker -->
<section class="space-y-4">
<div class="glass-card rounded-2xl p-5 border-l-4 border-l-primary">
<div class="flex items-center justify-between">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-full bg-primary/20 flex items-center justify-center">
<span class="material-symbols-outlined text-primary">ecg</span>
</div>
<div>
<h3 class="font-bold">QT Interval Tracker</h3>
<p class="text-xs text-slate-400 leading-tight">Enable real-time cardiac monitoring</p>
</div>
</div>
<div class="relative inline-flex items-center cursor-pointer">
<input class="sr-only peer" type="checkbox"/>
<div class="w-14 h-7 bg-slate-800 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[4px] after:left-[4px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-7 after:transition-all peer-checked:bg-primary"></div>
</div>
</div>
</div>
</section>
</main>
<!-- Footer Actions -->
<footer class="fixed bottom-0 left-0 right-0 glass-card border-t border-white/10 p-4 pb-8 flex items-center gap-3">
<button class="flex-1 h-14 rounded-xl font-semibold text-slate-400 hover:text-white hover:bg-white/5 transition-all">
            Back
        </button>
<button class="flex-[2] h-14 rounded-xl bg-primary text-white font-bold shadow-lg shadow-primary/20 hover:bg-primary/90 active:scale-[0.98] transition-all">
            Save &amp; Continue
        </button>
</footer>
</body></html>
