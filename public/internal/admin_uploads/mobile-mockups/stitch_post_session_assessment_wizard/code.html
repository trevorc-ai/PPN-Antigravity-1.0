<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Assessment Wizard - Unity</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2b6cee",
                        "background-light": "#f6f6f8",
                        "background-dark": "#101622",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .glass-panel {
            background: rgba(43, 108, 238, 0.05);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .glass-card-active {
            background: rgba(43, 108, 238, 0.2);
            border-color: rgba(43, 108, 238, 0.5);
            box-shadow: 0 0 20px rgba(43, 108, 238, 0.15);
        }
        body {
            height: 100dvh;
            overflow: hidden;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-dark font-display text-slate-100 flex items-center justify-center p-4">
<!-- Mobile Container -->
<div class="relative w-full max-w-md h-full max-h-[700px] flex flex-col glass-panel rounded-xl overflow-hidden shadow-2xl">
<!-- Header & Progress -->
<header class="pt-6 px-6 pb-2">
<div class="flex justify-between items-end mb-2">
<span class="text-xs font-semibold tracking-wider text-primary/80 uppercase">Assessment Wizard</span>
<span class="text-xs text-slate-400">Question 1 of 5</span>
</div>
<div class="h-1.5 w-full bg-slate-800 rounded-full overflow-hidden">
<div class="h-full bg-primary w-1/5 shadow-[0_0_10px_rgba(43,108,238,0.5)]"></div>
</div>
</header>
<!-- Question Area -->
<main class="flex-1 flex flex-col px-6 py-4 justify-center">
<div class="mb-4">
<span class="inline-block px-2 py-0.5 rounded bg-primary/10 border border-primary/20 text-[10px] font-mono text-primary mb-2">REF: PHENOM-01</span>
<h1 class="text-xl font-bold leading-tight text-slate-100">Experience of unity with ultimate reality.</h1>
</div>
<!-- Selection Stack -->
<div class="space-y-2">
<!-- Option 0 -->
<label class="group flex items-center justify-between glass-card px-4 py-3 rounded-lg cursor-pointer hover:bg-white/5 transition-all">
<span class="text-sm font-medium text-slate-300">0 - None</span>
<div class="w-5 h-5 rounded-full border-2 border-slate-600 flex items-center justify-center">
<input class="hidden" name="assessment" type="radio"/>
</div>
</label>
<!-- Option 1 -->
<label class="group flex items-center justify-between glass-card px-4 py-3 rounded-lg cursor-pointer hover:bg-white/5 transition-all">
<span class="text-sm font-medium text-slate-300">1 - Slight</span>
<div class="w-5 h-5 rounded-full border-2 border-slate-600 flex items-center justify-center">
<input class="hidden" name="assessment" type="radio"/>
</div>
</label>
<!-- Option 2 (Active State) -->
<label class="group flex items-center justify-between glass-card glass-card-active px-4 py-3 rounded-lg cursor-pointer transition-all">
<span class="text-sm font-semibold text-white">2 - Moderate</span>
<div class="w-5 h-5 rounded-full border-2 border-primary bg-primary flex items-center justify-center">
<input checked="" class="hidden" name="assessment" type="radio"/>
<span class="material-symbols-outlined text-[14px] text-white font-bold">check</span>
</div>
</label>
<!-- Option 3 -->
<label class="group flex items-center justify-between glass-card px-4 py-3 rounded-lg cursor-pointer hover:bg-white/5 transition-all">
<span class="text-sm font-medium text-slate-300">3 - Strong</span>
<div class="w-5 h-5 rounded-full border-2 border-slate-600 flex items-center justify-center">
<input class="hidden" name="assessment" type="radio"/>
</div>
</label>
<!-- Option 4 -->
<label class="group flex items-center justify-between glass-card px-4 py-3 rounded-lg cursor-pointer hover:bg-white/5 transition-all">
<span class="text-sm font-medium text-slate-300">4 - Extreme</span>
<div class="w-5 h-5 rounded-full border-2 border-slate-600 flex items-center justify-center">
<input class="hidden" name="assessment" type="radio"/>
</div>
</label>
</div>
</main>
<!-- Footer Actions -->
<footer class="p-6 flex gap-3 mt-auto">
<button class="flex-1 flex items-center justify-center gap-2 h-12 rounded-lg border border-slate-700 text-slate-400 font-medium hover:bg-white/5 transition-colors">
<span class="material-symbols-outlined text-sm">chevron_left</span>
                Previous
            </button>
<button class="flex-[1.5] flex items-center justify-center gap-2 h-12 rounded-lg bg-primary text-white font-semibold shadow-lg shadow-primary/20 hover:bg-primary/90 transition-colors">
                Next
                <span class="material-symbols-outlined text-sm">chevron_right</span>
</button>
</footer>
<!-- Background Decor (Subtle Glows) -->
<div class="absolute -top-24 -left-24 w-48 h-48 bg-primary/10 blur-[80px] rounded-full pointer-events-none"></div>
<div class="absolute -bottom-24 -right-24 w-48 h-48 bg-primary/10 blur-[80px] rounded-full pointer-events-none"></div>
</div>
</body></html>
