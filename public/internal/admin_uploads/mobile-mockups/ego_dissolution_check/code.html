<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Ego Dissolution Check</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2b6cee",
                        "background-light": "#f6f6f8",
                        "background-dark": "#101622",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .glass {
            background: rgba(43, 108, 238, 0.05);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased overflow-hidden">
<div class="relative flex h-screen w-full flex-col bg-background-light dark:bg-background-dark overflow-hidden">
<!-- Background decorative elements -->
<div class="absolute top-[-10%] right-[-10%] w-64 h-64 bg-primary/20 rounded-full blur-[100px] pointer-events-none"></div>
<div class="absolute bottom-[-10%] left-[-10%] w-80 h-80 bg-primary/10 rounded-full blur-[120px] pointer-events-none"></div>
<!-- Top Navigation -->
<div class="relative z-10 flex items-center p-6 justify-between">
<button class="text-slate-900 dark:text-slate-100 flex size-10 shrink-0 items-center justify-center rounded-full glass-card hover:bg-white/10 transition-colors">
<span class="material-symbols-outlined">close</span>
</button>
<h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-[-0.015em] flex-1 text-center pr-10 uppercase tracking-widest text-xs opacity-80">Ego Dissolution Check</h2>
</div>
<!-- Progress Section -->
<div class="relative z-10 flex flex-col gap-3 px-6 py-4">
<div class="flex gap-6 justify-between items-end">
<p class="text-slate-900 dark:text-slate-300 text-sm font-medium leading-normal">Question 2 of 2</p>
<p class="text-primary text-sm font-bold leading-normal">100%</p>
</div>
<div class="h-1.5 w-full rounded-full bg-slate-200 dark:bg-slate-800 overflow-hidden">
<div class="h-full rounded-full bg-primary shadow-[0_0_10px_rgba(43,108,238,0.5)]" style="width: 100%;"></div>
</div>
</div>
<!-- Main Question Content -->
<div class="relative z-10 flex-1 flex flex-col justify-center px-6 pb-20">
<div class="glass-card rounded-3xl p-8 text-center flex flex-col items-center gap-6">
<div class="size-12 rounded-full bg-primary/20 flex items-center justify-center mb-2">
<span class="material-symbols-outlined text-primary">psychology</span>
</div>
<h2 class="text-slate-900 dark:text-white tracking-tight text-3xl font-semibold leading-tight">
                    I experienced a dissolution of my 'self' or ego.
                </h2>
<p class="text-slate-500 dark:text-slate-400 text-xs font-normal leading-normal uppercase tracking-widest bg-slate-100 dark:bg-slate-800/50 px-3 py-1 rounded-full border border-slate-200 dark:border-slate-700">
                    Ref: Nour et al., 2016
                </p>
<!-- Slider Component -->
<div class="w-full mt-10 space-y-6">
<div class="flex items-center justify-between px-2">
<span class="text-slate-400 dark:text-slate-500 text-xs font-bold">0</span>
<div class="text-center">
<span class="text-primary text-5xl font-bold">66</span>
<p class="text-slate-400 text-[10px] uppercase tracking-tighter mt-1">Intensity Level</p>
</div>
<span class="text-slate-400 dark:text-slate-500 text-xs font-bold">100</span>
</div>
<div class="relative w-full h-12 flex items-center">
<div class="absolute w-full h-2 rounded-full bg-slate-200 dark:bg-slate-800"></div>
<div class="absolute h-2 rounded-full bg-primary" style="width: 66%;"></div>
<div class="absolute left-[66%] -translate-x-1/2 flex flex-col items-center">
<div class="size-8 rounded-full bg-primary border-4 border-white dark:border-background-dark shadow-xl ring-8 ring-primary/20"></div>
</div>
</div>
<div class="flex justify-between w-full px-2">
<span class="text-slate-400 dark:text-slate-500 text-[10px] font-medium uppercase">Not at all</span>
<span class="text-slate-400 dark:text-slate-500 text-[10px] font-medium uppercase">Extremely</span>
</div>
</div>
</div>
</div>
<!-- Footer Actions -->
<div class="relative z-10 p-6 glass border-t-0 flex gap-4 pb-10">
<button class="flex-1 h-14 rounded-xl border border-slate-200 dark:border-slate-700 text-slate-700 dark:text-slate-300 font-bold flex items-center justify-center gap-2 hover:bg-slate-50 dark:hover:bg-white/5 transition-all">
<span class="material-symbols-outlined text-lg">chevron_left</span>
                Previous
            </button>
<button class="flex-[2] h-14 rounded-xl bg-primary text-white font-bold shadow-lg shadow-primary/30 flex items-center justify-center gap-2 hover:brightness-110 active:scale-95 transition-all">
                Complete Assessment
                <span class="material-symbols-outlined text-lg">done_all</span>
</button>
</div>
</div>
</body></html>
