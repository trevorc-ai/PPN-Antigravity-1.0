<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<title>Session Vital Signs</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2b6cee",
                        "background-light": "#f6f6f8",
                        "background-dark": "#101622",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .glass-button {
            background: rgba(43, 108, 238, 0.1);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(43, 108, 238, 0.2);
        }
        body {
            height: 100dvh;
            overflow: hidden;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 h-screen flex flex-col">
<header class="flex-none glass-card border-x-0 border-t-0 bg-background-dark/80 px-4 py-3 flex items-center justify-between">
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-slate-800 transition-colors">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="text-lg font-bold tracking-tight">Session Vital Signs</h1>
<div class="w-10"></div>
</header>
<main class="flex-1 flex flex-col px-4 min-h-0 overflow-hidden">
<section class="mt-4 mb-4 flex-none">
<h2 class="text-[11px] font-semibold uppercase tracking-wider text-slate-400 mb-2 px-1">Quick Entry</h2>
<div class="space-y-1.5">
<button class="glass-button w-full flex items-center justify-between px-4 py-2.5 rounded-xl hover:bg-primary/20 transition-all">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary text-lg">history</span>
<span class="text-xs font-medium">Last Session Data</span>
</div>
<span class="material-symbols-outlined text-slate-500 text-sm">chevron_right</span>
</button>
<button class="glass-button w-full flex items-center justify-between px-4 py-2.5 rounded-xl hover:bg-primary/20 transition-all">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary text-lg">watch</span>
<span class="text-xs font-medium">Auto-sync Wearable</span>
</div>
<span class="material-symbols-outlined text-slate-500 text-sm">sync</span>
</button>
<button class="glass-button w-full flex items-center justify-between px-4 py-2.5 rounded-xl hover:bg-primary/20 transition-all">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary text-lg">restart_alt</span>
<span class="text-xs font-medium">Manual Reset</span>
</div>
</button>
</div>
</section>
<section class="flex-1 flex flex-col min-h-0 mb-4">
<h2 class="text-[11px] font-semibold uppercase tracking-wider text-slate-400 mb-2 px-1">Metrics</h2>
<div class="flex-1 flex flex-col justify-between gap-2 overflow-hidden">
<div class="glass-card rounded-xl p-3 flex items-center gap-3">
<div class="w-12 h-12 rounded-lg bg-red-500/10 flex items-center justify-center flex-shrink-0">
<span class="material-symbols-outlined text-red-500 text-2xl">favorite</span>
</div>
<div class="flex-1 min-w-0">
<div class="flex justify-between items-start mb-0.5">
<div>
<p class="text-[10px] text-slate-400 font-medium">Heart Rate</p>
<p class="text-base font-bold leading-tight">HR <span class="text-[10px] font-normal text-slate-500 ml-0.5">BPM</span></p>
</div>
<span class="text-[9px] px-1.5 py-0.5 rounded-full bg-green-500/10 text-green-500 border border-green-500/20">60-100 Normal</span>
</div>
<button class="w-full py-1.5 bg-primary/10 border border-primary/20 rounded-lg text-[10px] font-semibold text-primary">Enter Value</button>
</div>
</div>
<div class="glass-card rounded-xl p-3 flex items-center gap-3">
<div class="w-12 h-12 rounded-lg bg-blue-500/10 flex items-center justify-center flex-shrink-0">
<span class="material-symbols-outlined text-blue-500 text-2xl">pulmonology</span>
</div>
<div class="flex-1 min-w-0">
<div class="flex justify-between items-start mb-0.5">
<div>
<p class="text-[10px] text-slate-400 font-medium">Stress Indicator</p>
<p class="text-base font-bold leading-tight">HRV <span class="text-[10px] font-normal text-slate-500 ml-0.5">ms</span></p>
</div>
</div>
<button class="w-full py-1.5 bg-primary/10 border border-primary/20 rounded-lg text-[10px] font-semibold text-primary">Enter Value</button>
</div>
</div>
<div class="glass-card rounded-xl p-3 flex items-center gap-3">
<div class="w-12 h-12 rounded-lg bg-cyan-500/10 flex items-center justify-center flex-shrink-0">
<span class="material-symbols-outlined text-cyan-500 text-2xl">blood_pressure</span>
</div>
<div class="flex-1 min-w-0">
<div class="flex justify-between items-start mb-0.5">
<div>
<p class="text-[10px] text-slate-400 font-medium">Oxygen Saturation</p>
<p class="text-base font-bold leading-tight">SpO2 <span class="text-[10px] font-normal text-slate-500 ml-0.5">%</span></p>
</div>
<span class="text-[9px] px-1.5 py-0.5 rounded-full bg-slate-500/10 text-slate-400 border border-slate-500/20">95-100% Target</span>
</div>
<button class="w-full py-1.5 bg-primary/10 border border-primary/20 rounded-lg text-[10px] font-semibold text-primary">Enter Value</button>
</div>
</div>
<div class="glass-card rounded-xl p-3 flex items-center gap-3">
<div class="w-12 h-12 rounded-lg bg-purple-500/10 flex items-center justify-center flex-shrink-0">
<span class="material-symbols-outlined text-purple-500 text-2xl">monitor_heart</span>
</div>
<div class="flex-1 min-w-0">
<div class="flex justify-between items-start mb-0.5">
<div>
<p class="text-[10px] text-slate-400 font-medium">Blood Pressure</p>
<p class="text-base font-bold leading-tight">BP <span class="text-[10px] font-normal text-slate-500 ml-0.5">mmHg</span></p>
</div>
</div>
<button class="w-full py-1.5 bg-primary/10 border border-primary/20 rounded-lg text-[10px] font-semibold text-primary">Enter Value</button>
</div>
</div>
</div>
</section>
</main>
<footer class="flex-none p-4 bg-background-dark/90 backdrop-blur-xl border-t border-slate-800 flex gap-3">
<button class="flex-1 py-3.5 px-6 rounded-xl border border-slate-700 font-semibold text-xs hover:bg-slate-800 transition-colors">
            Back
        </button>
<button class="flex-[2] py-3.5 px-6 rounded-xl bg-primary text-white font-bold text-xs shadow-lg shadow-primary/20 hover:brightness-110 transition-all">
            Save &amp; Continue
        </button>
</footer>
</body></html>
