<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2b6cee",
                        "background-light": "#f6f6f8",
                        "background-dark": "#101622",
                        "clinical-teal": "#2dd4bf",
                        "clinical-amber": "#fbbf24",
                        "clinical-blue": "#3b82f6",
                        "clinical-purple": "#a855f7",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "2xl": "1rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        .glass {
            background: rgba(25, 34, 51, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .glass-card {
            background: rgba(30, 41, 59, 0.4);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }
        .glow-teal { box-shadow: 0 0 20px -5px rgba(45, 212, 191, 0.3); }
        .glow-amber { box-shadow: 0 0 20px -5px rgba(251, 191, 36, 0.3); }
        .glow-blue { box-shadow: 0 0 20px -5px rgba(59, 130, 246, 0.3); }
        .glow-purple { box-shadow: 0 0 20px -5px rgba(168, 85, 247, 0.3); }
    </style>
<style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>
<body class="font-display bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">
<header class="sticky top-0 z-50 glass border-b border-slate-800/50 px-4 py-3 flex items-center justify-between">
<div class="flex items-center gap-3">
<div class="bg-primary/20 p-2 rounded-lg">
<span class="material-symbols-outlined text-primary text-2xl">clinical_notes</span>
</div>
<div>
<h2 class="text-lg font-bold leading-tight tracking-tight">PPN Portal</h2>
<p class="text-[10px] uppercase tracking-widest text-slate-400 font-semibold">Precision Care</p>
</div>
</div>
<button aria-label="Notifications" class="size-11 flex items-center justify-center rounded-full glass-card border border-slate-700 active:scale-95 transition-transform">
<span class="material-symbols-outlined text-slate-300">notifications</span>
</button>
</header>
<main class="flex-1 overflow-y-auto pb-24">
<!-- Condensed Top Section -->
<div class="px-6 pt-6 pb-2">
<h1 class="text-2xl font-bold tracking-tight text-slate-100">Welcome, Dr. Sarah</h1>
<p class="text-slate-400 text-xs mt-1">Clinical command center &amp; real-time analytics.</p>
</div>
<section class="px-6 py-3">
<div class="glass-card rounded-2xl p-4 border border-primary/20 bg-gradient-to-br from-primary/10 to-transparent flex items-center justify-between h-20">
<div>
<p class="text-[10px] text-primary font-bold uppercase tracking-wider mb-0.5">Active Patients</p>
<h3 class="text-2xl font-bold">124</h3>
</div>
<div class="text-right">
<p class="text-xs text-clinical-teal font-medium flex items-center justify-end gap-1">
<span class="material-symbols-outlined text-xs">trending_up</span> +12%
                    </p>
<p class="text-[10px] text-slate-500">Since last shift</p>
</div>
</div>
</section>
<!-- Tools Section - Pulled up higher -->
<section class="px-6 py-2 grid grid-cols-1 gap-3">
<h3 class="text-[10px] font-semibold uppercase tracking-widest text-slate-500 mb-1 ml-1">Clinical Tools</h3>
<button class="glass-card rounded-2xl p-4 border-l-4 border-clinical-teal glow-teal flex items-center gap-4 active:scale-[0.98] transition-all text-left w-full min-h-[72px]">
<div class="size-11 rounded-xl bg-clinical-teal/10 flex items-center justify-center text-clinical-teal shrink-0">
<span class="material-symbols-outlined text-2xl">health_metrics</span>
</div>
<div class="flex-1">
<h4 class="font-bold text-sm text-slate-100">Wellness Journey</h4>
<p class="text-[11px] text-slate-400 line-clamp-1">Track longitudinal progress</p>
</div>
<span class="material-symbols-outlined text-slate-600">chevron_right</span>
</button>
<button class="glass-card rounded-2xl p-4 border-l-4 border-clinical-amber glow-amber flex items-center gap-4 active:scale-[0.98] transition-all text-left w-full min-h-[72px]">
<div class="size-11 rounded-xl bg-clinical-amber/10 flex items-center justify-center text-clinical-amber shrink-0">
<span class="material-symbols-outlined text-2xl">pill</span>
</div>
<div class="flex-1">
<h4 class="font-bold text-sm text-slate-100">Interaction Checker</h4>
<p class="text-[11px] text-slate-400 line-clamp-1">Validate polypharmacy safety</p>
</div>
<span class="material-symbols-outlined text-slate-600">chevron_right</span>
</button>
<button class="glass-card rounded-2xl p-4 border-l-4 border-clinical-blue glow-blue flex items-center gap-4 active:scale-[0.98] transition-all text-left w-full min-h-[72px]">
<div class="size-11 rounded-xl bg-clinical-blue/10 flex items-center justify-center text-clinical-blue shrink-0">
<span class="material-symbols-outlined text-2xl">menu_book</span>
</div>
<div class="flex-1">
<h4 class="font-bold text-sm text-slate-100">Substance Library</h4>
<p class="text-[11px] text-slate-400 line-clamp-1">Global database</p>
</div>
<span class="material-symbols-outlined text-slate-600">chevron_right</span>
</button>
<button class="glass-card rounded-2xl p-4 border-l-4 border-clinical-purple glow-purple flex items-center gap-4 active:scale-[0.98] transition-all text-left w-full min-h-[72px]">
<div class="size-11 rounded-xl bg-clinical-purple/10 flex items-center justify-center text-clinical-purple shrink-0">
<span class="material-symbols-outlined text-2xl">insights</span>
</div>
<div class="flex-1">
<h4 class="font-bold text-sm text-slate-100">Clinical Analytics</h4>
<p class="text-[11px] text-slate-400 line-clamp-1">Population health insights</p>
</div>
<span class="material-symbols-outlined text-slate-600">chevron_right</span>
</button>
</section>
<section class="px-6 py-4">
<div class="relative h-40 w-full rounded-2xl overflow-hidden glass-card border border-slate-700/50">
<img alt="Clinical dashboard overview" class="w-full h-full object-cover opacity-50 mix-blend-overlay" data-alt="Abstract data visualization dashboard with blue nodes" src="https://lh3.googleusercontent.com/aida-public/AB6AXuD_sUwQ6F9gxNQ2rkPqaTjF2fmH0dkiUzN7EYuSomhTcNKjLQ3ANlyVN7qTI57JMZT9QPkfbosXVdGIiAhwaVGelWG5NArFa8rbs_Qv2qNR2D4inPCD1FZmJ5yWrGhcSbeKe6TvspajQlY9R85_vmEEHqH31fiv9GqstXLniiGjWj9I9ojhPO866hfpGF5Vz96USZsrSzPqUGeFUAKFy4eXdlui8G71mznKrS5lClYfmbtNGWeqt1iJpKtqLTyE6_yE3AaXUUYIFEGm"/>
<div class="absolute inset-0 bg-gradient-to-t from-background-dark via-transparent p-4 flex flex-col justify-end">
<h4 class="font-bold text-white text-sm">System Status</h4>
<p class="text-[10px] text-clinical-teal flex items-center gap-1">
<span class="relative flex h-2 w-2">
<span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-clinical-teal opacity-75"></span>
<span class="relative inline-flex rounded-full h-2 w-2 bg-clinical-teal"></span>
</span>
                        All clinical nodes online
                    </p>
</div>
</div>
</section>
</main>
<nav class="fixed bottom-0 left-0 right-0 z-50 glass border-t border-slate-800/50 px-6 pt-3 pb-6 flex justify-between items-center">
<a class="flex flex-col items-center gap-1 text-primary min-w-[44px] min-h-[44px] justify-center" href="#">
<span class="material-symbols-outlined fill-1">home</span>
<span class="text-[10px] font-bold uppercase tracking-tighter">Home</span>
</a>
<a class="flex flex-col items-center gap-1 text-slate-400 min-w-[44px] min-h-[44px] justify-center" href="#">
<span class="material-symbols-outlined">group</span>
<span class="text-[10px] font-bold uppercase tracking-tighter">Patients</span>
</a>
<div class="relative -top-8">
<button aria-label="Add New" class="size-14 bg-primary text-white rounded-2xl shadow-xl shadow-primary/40 flex items-center justify-center border-4 border-background-dark active:scale-90 transition-transform">
<span class="material-symbols-outlined text-3xl">add</span>
</button>
</div>
<a class="flex flex-col items-center gap-1 text-slate-400 min-w-[44px] min-h-[44px] justify-center" href="#">
<span class="material-symbols-outlined">bar_chart</span>
<span class="text-[10px] font-bold uppercase tracking-tighter">Stats</span>
</a>
<a class="flex flex-col items-center gap-1 text-slate-400 min-w-[44px] min-h-[44px] justify-center" href="#">
<span class="material-symbols-outlined">settings</span>
<span class="text-[10px] font-bold uppercase tracking-tighter">Setup</span>
</a>
</nav>
</body></html>
