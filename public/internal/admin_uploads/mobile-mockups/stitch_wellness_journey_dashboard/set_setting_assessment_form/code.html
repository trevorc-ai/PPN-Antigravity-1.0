<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<style type="text/tailwindcss">
        :root {
            --amber-primary: #d97706;
            --amber-secondary: #f59e0b;
            --deep-space: #000000;
            --card-bg: #0a0a0a;
            --card-highlight: #151515;
            --input-bg: #0f0f0f;
            --text-primary: #ffffff;
            --text-secondary: #71717a;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--deep-space);
            color: var(--text-primary);
        }
        .deep-space-card {
            background-color: var(--card-bg);
            border-top: 1px solid rgba(255, 255, 255, 0.04);
            box-shadow: 0 4px 20px -5px rgba(0, 0, 0, 0.7);
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 24px;
            height: 24px;
            background: var(--amber-secondary);
            border: 2px solid var(--deep-space);
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(217, 119, 6, 0.6);
        }
        input[type="range"]::-moz-range-thumb {
            width: 24px;
            height: 24px;
            background: var(--amber-secondary);
            border: 2px solid var(--deep-space);
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(217, 119, 6, 0.6);
        }
    </style>
<style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="min-h-screen flex flex-col">
<header class="sticky top-0 z-10 bg-black/90 backdrop-blur-xl border-b border-white/5 px-4 py-2.5 flex items-center justify-between">
<button class="text-[var(--amber-secondary)] text-sm font-medium">Cancel</button>
<h1 class="text-white font-semibold text-sm tracking-tight">Set &amp; Setting Assessment Form</h1>
<div class="w-10"></div>
</header>
<main class="flex-1 px-4 py-3 space-y-4 max-w-md mx-auto w-full">
<section class="space-y-1.5">
<h2 class="text-[10px] font-bold uppercase tracking-[0.1em] text-[var(--text-secondary)] px-1">Patient Treatment Expectancy</h2>
<div class="deep-space-card rounded-xl p-3 space-y-3">
<div class="flex justify-between items-center mb-0.5">
<span class="text-[var(--text-secondary)] text-[10px] font-semibold uppercase">Low</span>
<span class="text-[var(--amber-secondary)] text-base font-bold tabular-nums">60</span>
<span class="text-[var(--text-secondary)] text-[10px] font-semibold uppercase">High</span>
</div>
<div class="relative h-5 flex items-center">
<div class="absolute w-full h-1.5 bg-[var(--input-bg)] rounded-full overflow-hidden">
<div class="h-full bg-[var(--amber-primary)] opacity-90 shadow-[0_0_8px_rgba(217,119,6,0.3)]" style="width: 60%"></div>
</div>
<input class="absolute w-full appearance-none bg-transparent cursor-pointer z-10" max="100" min="0" type="range" value="60"/>
</div>
<div class="bg-[var(--amber-primary)]/5 border border-[var(--amber-primary)]/10 rounded-lg p-2.5 relative">
<p class="text-[var(--amber-secondary)] text-[13px] font-medium leading-snug">
                    Moderate Expectancy. Continue building therapeutic alliance.
                </p>
</div>
</div>
</section>
<section class="space-y-1.5">
<h2 class="text-[10px] font-bold uppercase tracking-[0.1em] text-[var(--text-secondary)] px-1">Motivation Level</h2>
<div class="deep-space-card rounded-xl p-1.5">
<div class="grid grid-cols-2 gap-1.5">
<div class="bg-[var(--input-bg)] py-2 px-2 rounded-lg text-center text-[var(--text-secondary)] text-[13px] border border-white/5">Low</div>
<div class="bg-[var(--input-bg)] py-2 px-2 rounded-lg text-center text-[var(--text-secondary)] text-[13px] border border-white/5">Moderate</div>
<div class="bg-[var(--amber-primary)] py-2 px-2 rounded-lg text-center text-white font-bold text-[13px] shadow-[0_0_12px_rgba(217,119,6,0.4)]">High</div>
<div class="bg-[var(--input-bg)] py-2 px-2 rounded-lg text-center text-[var(--text-secondary)] text-[13px] border border-white/5">Very High</div>
</div>
</div>
</section>
<section class="space-y-1.5">
<h2 class="text-[10px] font-bold uppercase tracking-[0.1em] text-[var(--text-secondary)] px-1">Support System</h2>
<div class="deep-space-card rounded-xl p-1.5">
<div class="grid grid-cols-2 gap-1.5">
<div class="bg-[var(--input-bg)] py-2 px-2 rounded-lg text-center text-[var(--text-secondary)] text-[13px] border border-white/5">Weak</div>
<div class="bg-[var(--amber-primary)] py-2 px-2 rounded-lg text-center text-white font-bold text-[13px] shadow-[0_0_12px_rgba(217,119,6,0.4)]">Moderate</div>
<div class="bg-[var(--input-bg)] py-2 px-2 rounded-lg text-center text-[var(--text-secondary)] text-[13px] border border-white/5">Strong</div>
<div class="bg-[var(--input-bg)] py-2 px-2 rounded-lg text-center text-[var(--text-secondary)] text-[13px] border border-white/5">Robust</div>
</div>
</div>
</section>
<section class="space-y-1.5">
<h2 class="text-[10px] font-bold uppercase tracking-[0.1em] text-[var(--text-secondary)] px-1">Prior Psychedelic Experience</h2>
<div class="deep-space-card rounded-xl p-1.5">
<div class="flex gap-1.5">
<div class="flex-1 bg-[var(--input-bg)] py-2 px-1 rounded-lg text-center text-[var(--text-secondary)] text-[11px] border border-white/5">None</div>
<div class="flex-1 bg-[var(--amber-primary)] py-2 px-1 rounded-lg text-center text-white font-bold text-[11px] shadow-[0_0_12px_rgba(217,119,6,0.4)]">Some</div>
<div class="flex-1 bg-[var(--input-bg)] py-2 px-1 rounded-lg text-center text-[var(--text-secondary)] text-[11px] border border-white/5">Experienced</div>
<div class="flex-1 bg-[var(--input-bg)] py-2 px-1 rounded-lg text-center text-[var(--text-secondary)] text-[11px] border border-white/5">Expert</div>
</div>
</div>
</section>
</main>
<footer class="sticky bottom-0 bg-black/95 backdrop-blur-xl border-t border-white/5 p-4 mt-auto">
<button class="w-full bg-[var(--amber-primary)] active:bg-[var(--amber-secondary)] text-white font-bold py-3.5 rounded-xl transition-all text-base shadow-[0_0_20px_rgba(217,119,6,0.2)]">
        Save &amp; Continue
    </button>
</footer>

</body></html>
