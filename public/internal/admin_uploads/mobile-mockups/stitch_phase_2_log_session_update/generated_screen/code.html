<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<title>Log Session Update - Wellness Journey</title>
<!-- Tailwind CSS v3 CDN -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              navy: '#0f172a',
              deep: '#020617',
              accent: '#10b981', // emerald-500
              warning: '#f59e0b', // amber-500
              danger: '#ef4444', // red-500
              glass: 'rgba(30, 41, 59, 0.7)',
            },
          },
          backdropBlur: {
            'xl': '20px',
          }
        }
      }
    }
  </script>
<!-- BEGIN: Custom Styles -->
<style data-purpose="glassmorphism-ui">
    .glass-panel {
      background: rgba(30, 41, 59, 0.7);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
    }

    .inner-glow {
      box-shadow: inset 0 1px 1px 0 rgba(255, 255, 255, 0.1);
    }

    .bottom-sheet-transition {
      transition: transform 0.3s ease-out;
    }

    /* Tactile Chip Styles */
    .chip-active {
      background: rgba(16, 185, 129, 0.2);
      border-color: #10b981;
      color: #10b981;
      box-shadow: 0 0 15px rgba(16, 185, 129, 0.3);
    }

    .chip-inactive {
      background: rgba(255, 255, 255, 0.05);
      border-color: rgba(255, 255, 255, 0.1);
      color: #94a3b8;
    }

    /* Stepper Input Styling */
    input[type='number']::-webkit-inner-spin-button,
    input[type='number']::-webkit-outer-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }
  </style>
<style data-purpose="typography">
    body {
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background-color: #020617;
      color: #f8fafc;
      overflow: hidden; /* Prevent background scroll when sheet is open */
    }
  </style>
<!-- END: Custom Styles -->
</head>
<body class="h-screen flex items-end justify-center">
<!-- BEGIN: Background Context (Mimicking IMAGE_2) -->
<div class="fixed inset-0 z-0 p-4 opacity-30 grayscale blur-sm pointer-events-none">
<div class="w-full h-full border border-slate-700 rounded-xl p-4">
<div class="h-8 w-1/2 bg-slate-800 rounded mb-4"></div>
<div class="grid grid-cols-3 gap-2 mb-6">
<div class="h-20 bg-slate-800 rounded"></div>
<div class="h-20 bg-slate-800 rounded"></div>
<div class="h-20 bg-slate-800 rounded"></div>
</div>
<div class="h-40 bg-slate-800 rounded"></div>
</div>
</div>
<!-- END: Background Context -->
<!-- BEGIN: Modal Backdrop -->
<div class="fixed inset-0 bg-black/60 backdrop-blur-sm z-10"></div>
<!-- END: Modal Backdrop -->
<!-- BEGIN: Bottom Sheet Container -->
<div class="relative z-20 w-full max-w-md h-[92vh] glass-panel rounded-t-[2.5rem] flex flex-col overflow-hidden bottom-sheet-transition translate-y-0" data-purpose="log-session-update-sheet">
<!-- Drag Handle -->
<div class="flex justify-center pt-4 pb-2">
<div class="w-12 h-1.5 bg-slate-600 rounded-full opacity-50"></div>
</div>
<!-- BEGIN: Header -->
<header class="px-6 py-4 flex justify-between items-start border-b border-white/10" data-purpose="sheet-header">
<div>
<h1 class="text-xl font-bold tracking-tight">Log Session Update</h1>
<p class="text-xs font-mono text-slate-400 mt-1 flex items-center">
<span class="inline-block w-2 h-2 bg-emerald-500 rounded-full animate-pulse mr-2"></span>
          ELAPSED: T+00:04:22
        </p>
</div>
<button aria-label="Close" class="p-2 bg-white/5 rounded-full hover:bg-white/10 active:scale-95 transition-all">
<svg class="h-6 w-6 text-slate-400" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M6 18L18 6M6 6l12 12" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</button>
</header>
<!-- END: Header -->
<!-- BEGIN: Scrollable Content -->
<main class="flex-1 overflow-y-auto px-6 py-6 space-y-8 pb-32">
<!-- Patient Affect Section -->
<section data-purpose="affect-selection">
<h2 class="text-xs font-semibold text-slate-400 uppercase tracking-widest mb-4">Patient Affect</h2>
<div class="grid grid-cols-2 gap-3">
<button class="chip-inactive py-4 px-3 rounded-2xl border text-sm font-medium inner-glow active:scale-[0.98] transition-all">Calm</button>
<button class="chip-active py-4 px-3 rounded-2xl border text-sm font-medium inner-glow active:scale-[0.98] transition-all">Anxious</button>
<button class="chip-inactive py-4 px-3 rounded-2xl border text-sm font-medium inner-glow active:scale-[0.98] transition-all">Crying</button>
<button class="chip-inactive py-4 px-3 rounded-2xl border text-sm font-medium inner-glow active:scale-[0.98] transition-all">Joyful</button>
</div>
</section>
<!-- Responsiveness Section -->
<section data-purpose="responsiveness-selection">
<h2 class="text-xs font-semibold text-slate-400 uppercase tracking-widest mb-4">Responsiveness</h2>
<div class="grid grid-cols-2 gap-3">
<button class="chip-inactive py-4 px-3 rounded-2xl border text-sm font-medium inner-glow active:scale-[0.98] transition-all">Alert</button>
<button class="chip-inactive py-4 px-3 rounded-2xl border text-sm font-medium inner-glow active:scale-[0.98] transition-all">Dreamy</button>
<button class="chip-active py-4 px-3 rounded-2xl border text-sm font-medium inner-glow active:scale-[0.98] transition-all">Deep Trance</button>
<button class="chip-inactive py-4 px-3 rounded-2xl border text-sm font-medium inner-glow active:scale-[0.98] transition-all">Non-responsive</button>
</div>
</section>
<!-- BEGIN: Vitals Entry Section -->
<section class="space-y-6" data-purpose="vitals-entry">
<h2 class="text-xs font-semibold text-slate-400 uppercase tracking-widest">Manual Vitals Entry</h2>
<!-- HR Stepper -->
<div class="flex flex-col items-center">
<label class="text-xs text-slate-400 mb-2">Heart Rate (BPM)</label>
<div class="flex items-center space-x-8">
<button class="w-12 h-12 flex items-center justify-center rounded-full bg-white/5 border border-white/10 active:bg-white/20 transition-colors" data-purpose="stepper-minus">
<svg class="h-6 w-6" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M20 12H4" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg>
</button>
<input class="bg-transparent border-none text-4xl font-bold w-20 text-center focus:ring-0 p-0" id="hr-input" type="number" value="78"/>
<button class="w-12 h-12 flex items-center justify-center rounded-full bg-white/5 border border-white/10 active:bg-white/20 transition-colors" data-purpose="stepper-plus">
<svg class="h-6 w-6" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 4v16m8-8H4" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg>
</button>
</div>
</div>
<div class="grid grid-cols-2 gap-8 pt-4">
<!-- Systolic Stepper -->
<div class="flex flex-col items-center">
<label class="text-xs text-slate-400 mb-2 uppercase">Systolic</label>
<div class="flex items-center space-x-4">
<button class="w-10 h-10 flex items-center justify-center rounded-full bg-white/5 border border-white/10" data-purpose="stepper-minus">
<svg class="h-5 w-5" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M20 12H4" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg>
</button>
<input class="bg-transparent border-none text-2xl font-bold w-14 text-center focus:ring-0 p-0" type="number" value="122"/>
<button class="w-10 h-10 flex items-center justify-center rounded-full bg-white/5 border border-white/10" data-purpose="stepper-plus">
<svg class="h-5 w-5" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 4v16m8-8H4" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg>
</button>
</div>
</div>
<!-- Diastolic Stepper -->
<div class="flex flex-col items-center">
<label class="text-xs text-slate-400 mb-2 uppercase">Diastolic</label>
<div class="flex items-center space-x-4">
<button class="w-10 h-10 flex items-center justify-center rounded-full bg-white/5 border border-white/10" data-purpose="stepper-minus">
<svg class="h-5 w-5" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M20 12H4" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg>
</button>
<input class="bg-transparent border-none text-2xl font-bold w-14 text-center focus:ring-0 p-0" type="number" value="82"/>
<button class="w-10 h-10 flex items-center justify-center rounded-full bg-white/5 border border-white/10" data-purpose="stepper-plus">
<svg class="h-5 w-5" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 4v16m8-8H4" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg>
</button>
</div>
</div>
</div>
</section>
<!-- END: Vitals Entry Section -->
</main>
<!-- END: Scrollable Content -->
<!-- BEGIN: Sticky Footer -->
<footer class="absolute bottom-0 left-0 right-0 p-6 pb-10 bg-gradient-to-t from-brand-navy via-brand-navy to-transparent pointer-events-none" data-purpose="sheet-footer">
<button class="pointer-events-auto w-full py-4 bg-emerald-500 hover:bg-emerald-400 active:bg-emerald-600 text-white font-bold rounded-2xl shadow-lg shadow-emerald-500/20 transition-all flex items-center justify-center space-x-2">
<svg class="h-5 w-5" fill="currentColor" viewbox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
<path clip-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" fill-rule="evenodd"></path>
</svg>
<span>Save Update</span>
</button>
</footer>
<!-- END: Sticky Footer -->
</div>
<!-- END: Bottom Sheet Container -->
<!-- BEGIN: Logic for Steppers -->
<script data-purpose="stepper-interactivity">
    document.querySelectorAll('[data-purpose="stepper-plus"]').forEach(button => {
      button.addEventListener('click', () => {
        const input = button.parentElement.querySelector('input');
        input.value = parseInt(input.value) + 1;
      });
    });

    document.querySelectorAll('[data-purpose="stepper-minus"]').forEach(button => {
      button.addEventListener('click', () => {
        const input = button.parentElement.querySelector('input');
        if (parseInt(input.value) > 0) {
          input.value = parseInt(input.value) - 1;
        }
      });
    });
  </script>
<!-- END: Logic for Steppers -->
</body></html>
