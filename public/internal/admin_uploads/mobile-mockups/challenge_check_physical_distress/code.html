<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Challenge Check - Assessment</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2b6cee",
                        "background-light": "#f6f6f8",
                        "background-dark": "#101622",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .glass-button {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.2s ease;
        }
        .glass-button:active {
            background: rgba(43, 108, 238, 0.3);
            border-color: #2b6cee;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display antialiased text-slate-900 dark:text-slate-100 overflow-hidden h-screen">
<div class="relative flex h-full w-full max-w-md mx-auto flex-col bg-background-light dark:bg-background-dark shadow-2xl overflow-hidden border-x border-slate-800/20 dark:border-slate-800/50">
<header class="flex items-center p-4 justify-between glass-panel sticky top-0 z-10 border-t-0 border-x-0">
<button class="flex items-center justify-center size-10 rounded-full hover:bg-slate-200 dark:hover:bg-slate-800">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h2 class="text-lg font-bold leading-tight tracking-tight flex-1 text-center pr-10">Challenge Check</h2>
</header>
<main class="flex-1 flex flex-col p-6 gap-6 justify-center">
<div class="space-y-3">
<div class="flex justify-between items-end">
<span class="text-sm font-medium text-slate-500 dark:text-slate-400">Assessment Progress</span>
<span class="text-sm font-bold text-primary">3 of 3</span>
</div>
<div class="h-2 w-full bg-slate-200 dark:bg-slate-800 rounded-full overflow-hidden">
<div class="h-full bg-primary rounded-full" style="width: 100%;"></div>
</div>
</div>
<div class="text-center py-4">
<h3 class="text-2xl font-bold leading-tight text-slate-900 dark:text-white">I experienced physical distress.</h3>
</div>
<div class="flex flex-col gap-2 flex-1 max-h-[400px]">
<button class="glass-button flex items-center justify-start w-full px-5 py-4 rounded-xl text-left">
<span class="flex items-center justify-center size-8 rounded-lg bg-primary/10 text-primary font-bold mr-4">0</span>
<span class="font-medium">Not at all</span>
</button>
<button class="glass-button flex items-center justify-start w-full px-5 py-4 rounded-xl text-left">
<span class="flex items-center justify-center size-8 rounded-lg bg-primary/10 text-primary font-bold mr-4">1</span>
<span class="font-medium">Slightly</span>
</button>
<button class="glass-button flex items-center justify-start w-full px-5 py-4 rounded-xl text-left">
<span class="flex items-center justify-center size-8 rounded-lg bg-primary/10 text-primary font-bold mr-4">2</span>
<span class="font-medium">Moderately</span>
</button>
<button class="glass-button flex items-center justify-start w-full px-5 py-4 rounded-xl text-left">
<span class="flex items-center justify-center size-8 rounded-lg bg-primary/10 text-primary font-bold mr-4">3</span>
<span class="font-medium">Severely</span>
</button>
<button class="glass-button flex items-center justify-start w-full px-5 py-4 rounded-xl text-left">
<span class="flex items-center justify-center size-8 rounded-lg bg-primary/10 text-primary font-bold mr-4">4</span>
<span class="font-medium">Very Severely</span>
</button>
<button class="glass-button flex items-center justify-start w-full px-5 py-4 rounded-xl text-left border-primary/40 ring-1 ring-primary/20">
<span class="flex items-center justify-center size-8 rounded-lg bg-primary text-white font-bold mr-4">5</span>
<span class="font-medium">Extremely</span>
</button>
</div>
</main>
<footer class="p-6 glass-panel border-b-0 border-x-0 flex gap-3">
<button class="flex-1 py-4 px-6 rounded-xl font-bold bg-slate-200 dark:bg-slate-800 text-slate-700 dark:text-slate-300 hover:brightness-110 transition-all">
                Previous
            </button>
<button class="flex-[1.5] py-4 px-6 rounded-xl font-bold bg-primary text-white shadow-lg shadow-primary/20 hover:brightness-110 transition-all flex items-center justify-center gap-2">
                Complete
                <span class="material-symbols-outlined text-base">check_circle</span>
</button>
</footer>
</div>
</body></html>
