# ============================================================
# ci.yml
# Build and lint checks on PRs and pushes to active branches.
# ============================================================

name: CI

on:
  push:
    branches: [ main, staging ]
  pull_request:
    branches: [ main, staging ]

jobs:
  build:
    name: Build & Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Check TypeScript
        run: npx tsc --noEmit

      - name: Build project
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_STRIPE_PUBLISHABLE_KEY: ${{ secrets.VITE_STRIPE_PUBLISHABLE_KEY }}
          VITE_STRIPE_PRICE_STANDARD: ${{ secrets.VITE_STRIPE_PRICE_STANDARD }}
          VITE_STRIPE_PRICE_RESEARCH_PARTNER: ${{ secrets.VITE_STRIPE_PRICE_RESEARCH_PARTNER }}
          VITE_STRIPE_PRICE_ANNUAL: ${{ secrets.VITE_STRIPE_PRICE_ANNUAL }}

  lint:
    name: Lint Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check for console.log
        run: |
          COUNT=$(grep -r "console\.log" src/ --include="*.tsx" --include="*.ts" | grep -v "// allow-console" | wc -l)
          echo "Found $COUNT console.log statements"
          if [ "$COUNT" -gt 0 ]; then
            echo "::warning::$COUNT console.log statements found. Remove before release."
          fi

      - name: Check for excessive 'any' types
        run: |
          ANY_COUNT=$(grep -r ": any" src/ --include="*.tsx" --include="*.ts" | wc -l)
          echo "Found $ANY_COUNT instances of 'any' type"
          if [ $ANY_COUNT -gt 35 ]; then
            echo "::warning::Too many 'any' types ($ANY_COUNT). Please add proper TypeScript types."
          fi
